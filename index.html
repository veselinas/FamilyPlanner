<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family Planner">
<meta name="theme-color" content="#0d1117">
<title>Family Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0d1117;
  --bg2:   #161b22;
  --bg3:   #21262d;
  --bg4:   #2d333b;
  --border:#30363d;
  --border2:#3d444d;
  --text:  #e6edf3;
  --text2: #8b949e;
  --text3: #6e7681;
  --accent:#58a6ff;
  --accent2:#1f6feb;
  --green: #3fb950;
  --yellow:#d29922;
  --red:   #f85149;
  --purple:#bc8cff;
  --orange:#ffa657;
  --family:#58a6ff;
  --user:  #3fb950;
  --r:8px; --r2:12px;
  --mono:'DM Mono',monospace;
  --display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--display);overflow:hidden}
body{display:flex;flex-direction:column;height:100dvh}

/* ── HEADER */
#header{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50}
#user-area{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
select,input{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--r);font-family:var(--display);outline:none}
select:focus,input:focus{border-color:var(--accent)}
#user-select{padding:5px 8px;font-size:13px;max-width:140px;cursor:pointer}
#btn-add-user{background:var(--bg3);border:1px solid var(--border);color:var(--accent);width:30px;height:30px;border-radius:var(--r);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#btn-add-user:hover{background:var(--bg4)}
.od-status{display:flex;align-items:center;gap:4px;flex-shrink:0}
.od-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.od-dot.ok{background:var(--green)}.od-dot.err{background:var(--red)}
.od-label{font-size:10px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
#week-info{text-align:center;flex:1;flex-shrink:0}
#week-num-lbl{font-size:12px;font-family:var(--mono);color:var(--text2)}
#date-range-lbl{font-size:10px;font-family:var(--mono);color:var(--text3)}
#btn-save{background:var(--accent2);border:none;color:#fff;padding:6px 16px;border-radius:var(--r);font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s,transform .1s;flex-shrink:0}
#btn-save:hover{background:var(--accent)}
#btn-save:active{transform:scale(.96)}
#btn-save.saved{background:var(--green)}

/* ── MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* ── TASKS PANEL */
#tasks-panel{width:40%;min-width:200px;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
@media(min-width:768px){#tasks-panel{width:37%}}
#tasks-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#tasks-hdr h2{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);flex-shrink:0}
#goal-filter{padding:4px 6px;font-size:11px;max-width:110px;cursor:pointer}
#btn-add-task{background:var(--bg3);border:1px solid var(--accent2);color:var(--accent);padding:4px 9px;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s;margin-left:auto}
#btn-add-task:hover{background:var(--bg4)}
#tasks-list{flex:1;overflow-y:auto;padding:6px}
#tasks-list::-webkit-scrollbar{width:3px}
#tasks-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* category/subcat */
.cat-block{margin-bottom:6px}
.cat-hdr{display:flex;align-items:center;gap:5px;padding:4px 7px;cursor:pointer;border-radius:var(--r);font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text2);background:var(--bg3);border:1px solid var(--border);user-select:none}
.cat-hdr:hover{background:var(--bg4)}
.arr{font-size:9px;transition:transform .18s}
.collapsed .arr{transform:rotate(-90deg)}
.subcat-block{margin:3px 0 0 4px}
.sub-hdr{display:flex;align-items:center;gap:4px;padding:3px 8px;cursor:pointer;font-size:10px;font-weight:600;color:var(--text3);user-select:none}
.sub-hdr:hover{color:var(--text2)}
.task-cols{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:2px 6px 4px}
.col-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:1px 4px;border-radius:3px;text-align:center}
.col-lbl.fam{color:var(--family);background:rgba(88,166,255,.1)}
.col-lbl.usr{color:var(--user);background:rgba(63,185,80,.1)}
.tcol{display:flex;flex-direction:column;gap:3px}

/* task card */
.tcard{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 6px;cursor:grab;transition:border-color .12s,box-shadow .12s;user-select:none}
.tcard:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tcard.dragging{opacity:.4;cursor:grabbing}
.tcard.fam{border-left:2px solid var(--family)}
.tcard.usr{border-left:2px solid var(--user)}
.tcard-top{display:flex;align-items:baseline;flex-wrap:wrap;gap:2px}
.prio-badge{font-size:8px;font-weight:700;font-family:var(--mono);padding:1px 3px;border-radius:3px;flex-shrink:0}
.pP-H{background:rgba(248,81,73,.18);color:var(--red)}
.pP-M{background:rgba(210,153,34,.18);color:var(--yellow)}
.pP-L{background:rgba(63,185,80,.14);color:var(--green)}
.tname{font-size:11px;font-weight:500}
.tdur{font-size:9px;color:var(--text3);font-family:var(--mono)}
.tmeta{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap}
.tdl{color:var(--orange)}.tfreq{color:var(--purple)}

/* no-user */
.no-user{padding:16px;text-align:center;color:var(--text3);font-size:12px}

/* ── WEEK PANEL */
#week-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#week-nav{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#week-nav button{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:var(--r);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .12s}
#week-nav button:hover{background:var(--bg4)}
#day-lbl{font-size:12px;font-family:var(--mono);color:var(--text2);font-weight:600}

/* week grid */
#week-grid{flex:1;display:flex;flex-direction:column;overflow:hidden}
#day-hdrs-row{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.t-gutter{width:42px;flex-shrink:0}
.dhdr{flex:1;text-align:center;padding:4px 2px;font-size:10px;font-family:var(--mono);color:var(--text3);border-left:1px solid var(--border)}
.dhdr.today{color:var(--accent);font-weight:700;background:rgba(88,166,255,.06)}

/* unscheduled tray */
#unsched-row{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;min-height:38px;max-height:72px;overflow-y:auto}
.unsched-gutter{width:42px;flex-shrink:0;font-size:9px;color:var(--text3);font-family:var(--mono);padding:5px 5px 0;text-align:right}
.unsched-col{flex:1;border-left:1px solid var(--border);min-height:38px;padding:3px;display:flex;flex-wrap:wrap;gap:3px;position:relative}
.unsched-col.dov{background:rgba(88,166,255,.07)}

/* time grid */
#week-body{flex:1;overflow-y:scroll;overflow-x:hidden}
#week-body::-webkit-scrollbar{width:4px}
#week-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#tgrid{display:flex}
#t-labels{width:42px;flex-shrink:0}
.tlabel{height:60px;display:flex;align-items:flex-start;padding-top:2px;padding-right:5px;font-size:8px;font-family:var(--mono);color:var(--text3);justify-content:flex-end}
#dcols-wrap{flex:1;display:flex}
.dcol{flex:1;border-left:1px solid var(--border);position:relative;height:1440px}
.dcol.today-col{background:rgba(88,166,255,.025)}
.dcol.dov{background:rgba(88,166,255,.06)}
.hr-line{position:absolute;left:0;right:0;border-top:1px solid var(--border);pointer-events:none}
.qr-line{position:absolute;left:0;right:0;border-top:1px dashed rgba(48,54,61,.45);pointer-events:none}

/* week task block */
.wblock{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 4px;font-size:10px;font-weight:500;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border:1px solid transparent;transition:filter .12s;z-index:2;user-select:none;font-family:var(--display)}
.wblock.fam{background:rgba(88,166,255,.2);border-color:var(--family);color:var(--family)}
.wblock.usr{background:rgba(63,185,80,.2);border-color:var(--user);color:var(--user)}
.wblock:hover{filter:brightness(1.25)}
.wblock.dragging-w{opacity:.35}
.wblock .rh{position:absolute;bottom:0;left:0;right:0;height:6px;cursor:ns-resize;background:linear-gradient(transparent,rgba(255,255,255,.08))}

/* tray chip */
.tchip{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;font-size:9px;font-weight:500;cursor:grab;white-space:nowrap;user-select:none}
.tchip.fam{border-left:2px solid var(--family);color:var(--family)}
.tchip.usr{border-left:2px solid var(--user);color:var(--user)}
.tchip:hover{filter:brightness(1.15)}

/* now line */
.nowline{position:absolute;left:0;right:0;border-top:2px solid var(--red);z-index:5;pointer-events:none}
.nowdot{position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:var(--red)}

/* ── PRINT BAR */
#print-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
#print-bar label{font-size:11px;color:var(--text3)}
#print-bar input{padding:4px 7px;font-size:11px;width:66px;font-family:var(--mono)}
#btn-print{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;transition:background .12s}
#btn-print:hover{background:var(--bg4)}

/* ── MODAL */
.movl{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);padding:14px}
.mdl{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:20px;width:100%;max-width:460px;max-height:90dvh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.mdl h3{font-size:14px;font-weight:700;margin-bottom:14px}
.fr{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.fr label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.fr input,.fr select,.fr textarea{padding:6px 9px;font-size:12px;border-radius:var(--r);width:100%}
.macts{display:flex;justify-content:flex-end;gap:7px;margin-top:14px}
.btn-c{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:var(--r);font-family:var(--display);font-size:12px;cursor:pointer}
.btn-ok{background:var(--accent2);border:none;color:#fff;padding:6px 16px;border-radius:var(--r);font-family:var(--display);font-size:12px;font-weight:700;cursor:pointer}
.btn-ok:hover{background:var(--accent)}

/* ── TOAST */
#toast{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 16px;border-radius:var(--r);font-size:12px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#msal-btn{display:none;position:fixed;bottom:66px;right:14px;background:var(--accent2);border:none;color:#fff;padding:7px 13px;border-radius:var(--r);cursor:pointer;font-family:var(--display);font-size:12px;font-weight:700;z-index:500}
#msal-btn.v{display:block}
</style>
</head>
<body>

<div id="header">
  <div id="user-area">
    <select id="user-select"><option value="">— User —</option></select>
    <button id="btn-add-user" title="Add user">+</button>
    <div class="od-status">
      <div class="od-dot" id="od-dot"></div>
      <span class="od-label" id="od-lbl">OneDrive</span>
    </div>
  </div>
  <div id="week-info">
    <div id="week-num-lbl">Week —</div>
    <div id="date-range-lbl">—</div>
  </div>
  <button id="btn-save">Save</button>
</div>

<div id="main">
  <!-- TASKS -->
  <div id="tasks-panel">
    <div id="tasks-hdr">
      <h2>Tasks</h2>
      <select id="goal-filter"><option value="">All goals</option></select>
      <button id="btn-add-task">+ Task</button>
    </div>
    <div id="tasks-list"></div>
  </div>

  <!-- WEEK -->
  <div id="week-panel">
    <div id="week-nav">
      <button id="btn-prev">&#8592;</button>
      <span id="day-lbl"></span>
      <button id="btn-next">&#8594;</button>
    </div>
    <div id="week-grid">
      <div id="day-hdrs-row"><div class="t-gutter"></div></div>
      <div id="unsched-row"><div class="unsched-gutter">∅</div></div>
      <div id="week-body">
        <div id="tgrid">
          <div id="t-labels"></div>
          <div id="dcols-wrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="print-bar">
  <label>Print week:</label>
  <input id="p-week" type="number" min="1" max="53" placeholder="Wk">
  <input id="p-year" type="number" min="2020" max="2099" placeholder="Year">
  <button id="btn-print">⬇ Export CSV</button>
</div>

<div id="toast"></div>
<button id="msal-btn">Sign in to OneDrive</button>

<script>
/* ═══════════════════════════════════════════
   GLOBAL CONFIG — change CLIENT_ID below
   ═══════════════════════════════════════════ */
window.AZURE_CLIENT_ID = "e800f792-bd36-483f-a74c-772787891ecd";

/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
const S = {
  user: null,
  users: [],
  tasks: [],         // family tasks
  uTasks: {},        // username -> []
  goals: [],
  plans: {},         // username -> []
  dirty: false,
  token: null,
  odOk: false,
  phone: innerWidth < 768,
  dayOff: 0,         // phone: 0-6 (Mon=0)
};

const FOLDER = "App_FamilyPlanner";
const TASK_HDRS = ['id','category','subcategory','task','duration','priority','scheduled','deadline','frequency','valid'];
const PLAN_HDRS = ['week_num','year','date','task_id','task','start_time','end_time','completed'];
const GOAL_HDRS = ['id','username','goal','task_id'];
const USER_HDRS = ['username'];

/* date helpers */
const p2 = n => String(n).padStart(2,'0');
function isoWeek(d) {
  const u = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  u.setUTCDate(u.getUTCDate()+4-(u.getUTCDay()||7));
  return Math.ceil((((u - new Date(Date.UTC(u.getUTCFullYear(),0,1)))/86400000)+1)/7);
}
function monday(w,y) {
  const j4 = new Date(y,0,4);
  const dow = j4.getDay()||7;
  const m = new Date(j4);
  m.setDate(j4.getDate()-dow+1+(w-1)*7);
  return m;
}
function fmtDate(d){ return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) }
function t2m(t){ if(!t)return 0; const[h,m]=t.split(':').map(Number); return h*60+(m||0) }
function m2t(m){ return `${p2(Math.floor(m/60))}:${p2(m%60)}` }
function dateStr(d){ return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}` }
function isToday(d){ const n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate() }

const NOW = new Date();
let dispWeek = isoWeek(NOW);
let dispYear = NOW.getFullYear();
S.dayOff = (NOW.getDay()+6)%7;

/* ═══════════════════════════════════════════
   CSV
   ═══════════════════════════════════════════ */
function parseCSV(txt){
  const lines=txt.trim().split('\n');
  if(lines.length<2)return[];
  const hdrs=lines[0].split(',').map(s=>s.trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const v=l.split(',').map(s=>s.trim());
    const o={};
    hdrs.forEach((h,i)=>o[h]=v[i]??'');
    return o;
  });
}
function toCSV(rows,hdrs){
  return [hdrs.join(','),...rows.map(r=>hdrs.map(h=>(r[h]??'').replace(/,/g,'；')).join(','))].join('\n');
}

/* ═══════════════════════════════════════════
   ONEDRIVE
   ═══════════════════════════════════════════ */
let msalApp = null;
const SCOPES = ['Files.ReadWrite','User.Read'];

async function initMSAL(){
  if(!window.AZURE_CLIENT_ID||window.AZURE_CLIENT_ID==="YOUR_AZURE_CLIENT_ID_HERE"){
    setOD(false,'No Client ID'); document.getElementById('msal-btn').classList.add('v'); return;
  }
  try{
    await loadScript("https://alcdn.msauth.net/browser/2.39.0/js/msal-browser.min.js");
    if(!window.msal){setOD(false,'MSAL fail');return;}
    msalApp = new msal.PublicClientApplication({
      auth:{clientId:window.AZURE_CLIENT_ID, redirectUri:location.href.split('?')[0]},
      cache:{cacheLocation:'sessionStorage'}
    });
    await msalApp.initialize();
    await getToken();
  }catch(e){setOD(false,'Error')}
}
function loadScript(src){return new Promise(r=>{const s=document.createElement('script');s.src=src;s.onload=r;s.onerror=r;document.head.appendChild(s)})}
async function getToken(interact=false){
  if(!msalApp)return;
  const accs=msalApp.getAllAccounts();
  try{
    let res;
    if(accs.length&&!interact) res=await msalApp.acquireTokenSilent({scopes:SCOPES,account:accs[0]});
    else if(interact)          res=await msalApp.acquireTokenPopup({scopes:SCOPES});
    else return;
    S.token=res.accessToken; S.odOk=true;
    setOD(true,'Connected');
    document.getElementById('msal-btn').classList.remove('v');
    await loadAll();
  }catch{setOD(false,'Sign in needed');document.getElementById('msal-btn').classList.add('v')}
}
document.getElementById('msal-btn').onclick=()=>getToken(true);
function setOD(ok,lbl){
  document.getElementById('od-dot').className='od-dot '+(ok?'ok':'err');
  document.getElementById('od-lbl').textContent=lbl;
}

async function odGet(path){
  const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${FOLDER}/${path}:/content`,
    {headers:{Authorization:`Bearer ${S.token}`}});
  if(!r.ok)throw new Error(r.status);
  return r.text();
}
async function odPut(path,txt){
  const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${FOLDER}/${path}:/content`,
    {method:'PUT',headers:{Authorization:`Bearer ${S.token}`,'Content-Type':'text/plain'},body:txt});
  if(!r.ok)throw new Error(r.status);
}

/* ═══════════════════════════════════════════
   LOAD / SAVE
   ═══════════════════════════════════════════ */
async function loadAll(){
  if(!S.odOk){loadDemo();return;}
  try{
    S.users  = parseCSV(await odGet('users.csv').catch(()=>'username\n'));
    S.tasks  = parseCSV(await odGet('tasks.csv').catch(()=>TASK_HDRS.join(',')+'\n'));
    S.goals  = parseCSV(await odGet('goals.csv').catch(()=>GOAL_HDRS.join(',')+'\n'));
    for(const u of S.users){
      const n=u.username;
      S.uTasks[n] = parseCSV(await odGet(`tasks_${n}.csv`).catch(()=>TASK_HDRS.join(',')+'\n'));
      S.plans[n]  = parseCSV(await odGet(`weekplan_${n}.csv`).catch(()=>PLAN_HDRS.join(',')+'\n'));
    }
    renderAll();
  }catch(e){toast('Load error: '+e.message)}
}

function loadDemo(){
  S.users=[{username:'Alice'},{username:'Bob'}];
  S.tasks=[
    {id:'f1',category:'Home',subcategory:'Cleaning',task:'Vacuum living room',duration:'30',priority:'M',scheduled:'no',deadline:'',frequency:'weekly',valid:'yes'},
    {id:'f2',category:'Home',subcategory:'Cleaning',task:'Clean bathrooms',duration:'45',priority:'H',scheduled:'no',deadline:'',frequency:'weekly',valid:'yes'},

/* ═══════════════════════════════════════════
   TASKS RENDER
   ═══════════════════════════════════════════ */
function visibleTasks(){
  const gf=document.getElementById('goal-filter').value;
  let fam=(S.tasks||[]).filter(t=>t.valid==='yes');
  let usr=S.user?(S.uTasks[S.user]||[]).filter(t=>t.valid==='yes'):[];
  if(gf&&S.user){
    const ids=S.goals.filter(g=>g.username===S.user&&g.goal===gf).map(g=>g.task_id);
    fam=fam.filter(t=>ids.includes(t.id));
    usr=usr.filter(t=>ids.includes(t.id));
  }
  return{fam,usr};
}

function catTree(arr){
  const t={};
  arr.forEach(x=>{const c=x.category||'Other',s=x.subcategory||'General';if(!t[c])t[c]={};if(!t[c][s])t[c][s]=[];t[c][s].push(x)});
  return t;
}

function sortTasks(arr){
  const po={H:0,M:1,L:2};
  return arr.slice().sort((a,b)=>{
    const da=a.deadline?new Date(a.deadline):new Date('9999');
    const db=b.deadline?new Date(b.deadline):new Date('9999');
    return da-db||(po[a.priority]??2)-(po[b.priority]??2);
  });
}

function renderTasks(){
  const el=document.getElementById('tasks-list');
  el.innerHTML='';
  if(!S.user){el.innerHTML='<div class="no-user">Select a user to view tasks</div>';return;}
  const{fam,usr}=visibleTasks();
  const ft=catTree(fam), ut=catTree(usr);
  const cats=[...new Set([...Object.keys(ft),...Object.keys(ut)])].sort();

  cats.forEach(cat=>{
    const catDiv=document.createElement('div');catDiv.className='cat-block';
    const ch=document.createElement('div');ch.className='cat-hdr';
    ch.innerHTML=`<span class="arr">▼</span>${cat}`;
    catDiv.appendChild(ch);
    const cb=document.createElement('div');

    const subs=[...new Set([...Object.keys(ft[cat]||{}),...Object.keys(ut[cat]||{})])].sort();
    subs.forEach(sub=>{
      const sd=document.createElement('div');sd.className='subcat-block';
      const sh=document.createElement('div');sh.className='sub-hdr';
      sh.innerHTML=`<span class="arr">▼</span>${sub}`;sd.appendChild(sh);

      const cols=document.createElement('div');cols.className='task-cols';
      const fl=document.createElement('div');fl.className='col-lbl fam';fl.textContent='Family';
      const ul=document.createElement('div');ul.className='col-lbl usr';ul.textContent=S.user;
      cols.appendChild(fl);cols.appendChild(ul);
      const fc=document.createElement('div');fc.className='tcol';
      const uc=document.createElement('div');uc.className='tcol';
      sortTasks((ft[cat]||{})[sub]||[]).forEach(t=>fc.appendChild(makeCard(t,'fam')));
      sortTasks((ut[cat]||{})[sub]||[]).forEach(t=>uc.appendChild(makeCard(t,'usr')));
      cols.appendChild(fc);cols.appendChild(uc);
      sd.appendChild(cols);cb.appendChild(sd);

      sh.onclick=()=>{sh.classList.toggle('collapsed');cols.style.display=sh.classList.contains('collapsed')?'none':''};
    });

    catDiv.appendChild(cb);el.appendChild(catDiv);
    ch.onclick=()=>{ch.classList.toggle('collapsed');cb.style.display=ch.classList.contains('collapsed')?'none':''};
  });
}

function makeCard(t,type){
  const c=document.createElement('div');
  c.className=`tcard ${type}`;c.draggable=true;
  c.dataset.id=t.id;c.dataset.type=type;
  const pr=t.priority||'L';
  const dur=t.duration?` (${t.duration}m)`:'';
  const dl=t.deadline?`<span class="tdl">⚑ ${t.deadline}</span>`:'';
  const fr=t.frequency&&t.frequency!=='once'?`<span class="tfreq">↻ ${t.frequency}</span>`:'';
  c.innerHTML=`
    <div class="tcard-top">
      <span class="prio-badge pP-${pr}">${pr}</span>
      <span class="tname">${t.task}</span><span class="tdur">${dur}</span>
    </div>
    <div class="tmeta">${dl}${fr}</div>`;
  c.addEventListener('dragstart',e=>{
    e.dataTransfer.setData('text/plain',JSON.stringify({id:t.id,type,dur:parseInt(t.duration)||0,name:t.task}));
    c.classList.add('dragging');
  });
  c.addEventListener('dragend',()=>c.classList.remove('dragging'));
  setupTouchSrc(c,{id:t.id,type,dur:parseInt(t.duration)||0,name:t.task,fromWeek:false,fromTray:false});
  c.addEventListener('dblclick',()=>{
    if(t.scheduled==='yes')return;
    if(!confirm(`Mark "${t.task}" complete? (valid → no)`))return;
    t.valid='no';S.dirty=true;renderTasks();renderWeek();
  });
  return c;
}

/* ═══════════════════════════════════════════
   WEEK RENDER
   ═══════════════════════════════════════════ */
const HPX=60; // 60px per hour

function dayDates(){
  const m=monday(dispWeek,dispYear);
  return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d});
}

function renderWeek(){
  const ph=S.phone;
  const days=dayDates();

  /* day headers */
  const dhr=document.getElementById('day-hdrs-row');
  dhr.innerHTML='<div class="t-gutter"></div>';
  const vi=ph?[S.dayOff]:[0,1,2,3,4,5,6];
  vi.forEach(i=>{
    const d=days[i];
    const el=document.createElement('div');
    el.className='dhdr'+(isToday(d)?' today':'');
    el.textContent=d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
    dhr.appendChild(el);
  });

  /* phone label */
  const pd=days[S.dayOff];
  document.getElementById('day-lbl').textContent=pd.toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'short'});

  /* time labels */
  const tl=document.getElementById('t-labels');
  tl.innerHTML='';
  for(let h=0;h<24;h++){const el=document.createElement('div');el.className='tlabel';el.textContent=`${p2(h)}:00`;tl.appendChild(el)}

  /* clear day cols + unsched */
  const dcw=document.getElementById('dcols-wrap');dcw.innerHTML='';
  document.querySelectorAll('.unsched-col').forEach(e=>e.remove());
  const urow=document.getElementById('unsched-row');

  vi.forEach(di=>{
    const d=days[di];
    const ds=dateStr(d);

    /* unsched col */
    const uc=document.createElement('div');uc.className='unsched-col';uc.dataset.date=ds;uc.dataset.di=di;
    setupDrop(uc,ds,true);urow.appendChild(uc);

    /* day col */
    const col=document.createElement('div');col.className='dcol'+(isToday(d)?' today-col':'');
    col.style.height=(HPX*24)+'px';col.dataset.date=ds;col.dataset.di=di;
    for(let h=0;h<24;h++){
      const hl=document.createElement('div');hl.className='hr-line';hl.style.top=(h*HPX)+'px';col.appendChild(hl);
      for(let q=1;q<4;q++){const ql=document.createElement('div');ql.className='qr-line';ql.style.top=(h*HPX+q*15)+'px';col.appendChild(ql)}
    }
    setupDrop(col,ds,false);
    dcw.appendChild(col);
  });

  renderNowLine(vi,days);
  renderPlanEntries(vi,days);
  renderUnschedChips(vi,days);
}

function renderNowLine(vi,days){
  document.querySelectorAll('.nowline').forEach(e=>e.remove());
  const m=NOW.getHours()*60+NOW.getMinutes();
  vi.forEach((di,ci)=>{
    if(!isToday(days[di]))return;
    const col=document.querySelectorAll('.dcol')[ci];if(!col)return;
    const l=document.createElement('div');l.className='nowline';l.style.top=(m*HPX/60)+'px';
    l.innerHTML='<div class="nowdot"></div>';col.appendChild(l);
  });
}

function planFor(){ return S.user?(S.plans[S.user]||[]):[] }

function renderPlanEntries(vi,days){
  document.querySelectorAll('.wblock').forEach(e=>e.remove());
  const plan=planFor();
  vi.forEach((di,ci)=>{
    const ds=dateStr(days[di]);
    const col=document.querySelectorAll('.dcol')[ci];if(!col)return;
    plan.filter(p=>p.date===ds&&!(p.start_time==='00:00'&&p.end_time==='00:00')).forEach(p=>{
      const sm=t2m(p.start_time),em=t2m(p.end_time);
      const top=sm*HPX/60, h=Math.max(15,(em-sm)*HPX/60);
      col.appendChild(makeWBlock(p,top,h));
    });
  });
}

function renderUnschedChips(vi,days){
  document.querySelectorAll('.tchip').forEach(e=>e.remove());
  const plan=planFor();
  vi.forEach((di,ci)=>{
    const ds=dateStr(days[di]);
    const uc=document.querySelectorAll('.unsched-col')[ci];if(!uc)return;
    plan.filter(p=>p.date===ds&&p.start_time==='00:00'&&p.end_time==='00:00').forEach(p=>{
      const tp=taskType(p.task_id);
      const chip=document.createElement('div');chip.className=`tchip ${tp}`;chip.textContent=p.task;chip.draggable=true;
      chip.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',JSON.stringify({fromTray:true,planEntry:p,id:p.task_id,type:tp,name:p.task,dur:0})));
      chip.addEventListener('click',()=>cycleStatus(p));
      setupTouchSrc(chip,{fromTray:true,planEntry:p,id:p.task_id,type:tp,name:p.task,dur:0});
      uc.appendChild(chip);
    });
  });
}

function taskType(id){
  if((S.uTasks[S.user]||[]).find(t=>t.id===id))return 'usr';
  return 'fam';
}

function findTask(id){ return S.tasks.find(t=>t.id===id)||Object.values(S.uTasks).flat().find(t=>t.id===id)||null }

function makeWBlock(p,top,height){
  const tp=taskType(p.task_id);
  const b=document.createElement('div');b.className=`wblock ${tp}`;
  b.style.top=top+'px';b.style.height=height+'px';
  let si='';
  if(p.completed==='in progress') si=' <span style="color:var(--yellow)">•••</span>';
  else if(p.completed==='yes')    si=' <span style="color:var(--green)">✓</span>';
  b.innerHTML=`${p.task}${si}<div class="rh"></div>`;
  b.addEventListener('click',e=>{if(e.target.classList.contains('rh'))return;cycleStatus(p)});
  b.draggable=true;
  b.addEventListener('dragstart',e=>{
    const dur=t2m(p.end_time)-t2m(p.start_time);
    e.dataTransfer.setData('text/plain',JSON.stringify({fromWeek:true,planEntry:p,id:p.task_id,type:tp,name:p.task,dur}));
    b.classList.add('dragging-w');
  });
  b.addEventListener('dragend',()=>b.classList.remove('dragging-w'));
  setupTouchSrc(b,{fromWeek:true,planEntry:p,id:p.task_id,type:tp,name:p.task,dur:t2m(p.end_time)-t2m(p.start_time)});
  return b;
}

function cycleStatus(p){
  const ord=['no','in progress','yes'];
  p.completed=ord[(ord.indexOf(p.completed||'no')+1)%3];
  if(p.completed==='yes'){const t=findTask(p.task_id);if(t&&t.scheduled==='yes')t.valid='no';}
  S.dirty=true;renderWeek();renderTasks();
}

/* ═══════════════════════════════════════════
   DROP ZONES
   ═══════════════════════════════════════════ */
function setupDrop(el,ds,isTray){
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dov')});
  el.addEventListener('dragleave',()=>el.classList.remove('dov'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('dov');
    let data;try{data=JSON.parse(e.dataTransfer.getData('text/plain'))}catch{return}
    if(isTray){dropTray(data,ds)}
    else{
      const rect=el.getBoundingClientRect();
      const wb=document.getElementById('week-body');
      const relY=e.clientY-rect.top+wb.scrollTop;
      const sm=Math.round(relY/HPX*60/15)*15;
      dropTimed(data,ds,sm);
    }
  });
}

function removePlan(data){
  if(!(data.fromWeek||data.fromTray)||!S.user)return;
  const p=data.planEntry;
  const arr=S.plans[S.user]||[];
  const i=arr.findIndex(x=>x.task_id===p.task_id&&x.date===p.date&&x.start_time===p.start_time);
  if(i>-1)arr.splice(i,1);
}

function dropTray(data,ds){
  if(!S.user){toast('Select a user first');return}
  removePlan(data);
  pushPlan({week_num:String(dispWeek),year:String(dispYear),date:ds,task_id:data.id,task:data.name,start_time:'00:00',end_time:'00:00',completed:'no'});
}

function dropTimed(data,ds,sm){
  if(!S.user){toast('Select a user first');return}
  let dur=data.dur||0;
  if(!dur){const a=prompt(`Duration for "${data.name}" in minutes:`);dur=parseInt(a)||30}
  removePlan(data);
  pushPlan({week_num:String(dispWeek),year:String(dispYear),date:ds,task_id:data.id,task:data.name,start_time:m2t(sm),end_time:m2t(sm+dur),completed:'no'});
}

function pushPlan(entry){
  if(!S.plans[S.user])S.plans[S.user]=[];
  S.plans[S.user].push(entry);
  S.dirty=true;renderWeek();
}

/* ═══════════════════════════════════════════
   TOUCH DRAG
   ═══════════════════════════════════════════ */
let td=null,tc=null;

function setupTouchSrc(el,data){
  el.addEventListener('touchstart',e=>{
    td=data;tc=el.cloneNode(true);
    tc.style.cssText=`position:fixed;z-index:9999;opacity:.7;pointer-events:none;width:${el.offsetWidth}px;transform:scale(.93)`;
    document.body.appendChild(tc);
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!tc)return;
    const t=e.touches[0];
    tc.style.left=(t.clientX-tc.offsetWidth/2)+'px';
    tc.style.top=(t.clientY-20)+'px';
  },{passive:true});
  el.addEventListener('touchend',e=>{
    if(!tc){return}tc.remove();tc=null;
    const t=e.changedTouches[0];
    handleTouchDrop(t.clientX,t.clientY,td);td=null;
  });
}

function handleTouchDrop(cx,cy,data){
  if(!data)return;
  const el=document.elementFromPoint(cx,cy);if(!el)return;
  const uc=el.closest('.unsched-col');
  const dc=el.closest('.dcol');
  if(uc)dropTray(data,uc.dataset.date);
  else if(dc){
    const rect=dc.getBoundingClientRect();
    const wb=document.getElementById('week-body');
    const sm=Math.round((cy-rect.top+wb.scrollTop)/HPX*60/15)*15;
    dropTimed(data,dc.dataset.date,sm);
  }
}

}

   ═══════════════════════════════════════════ */
function exportCSV(){
  if(!S.user){toast('Select a user first');return}
  const wk=parseInt(document.getElementById('p-week').value)||dispWeek;
  const yr=parseInt(document.getElementById('p-year').value)||dispYear;
  const rows=(S.plans[S.user]||[]).filter(p=>parseInt(p.week_num)===wk&&parseInt(p.year)===yr);
  const csv=toCSV(rows,PLAN_HDRS);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`weekplan_${S.user}_w${wk}_${yr}.csv`;
  a.click();toast('CSV exported');
}

/* ═══════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════ */
let _tt=null;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('show'),2500)}

/* ═══════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════ */
document.getElementById('user-select').onchange=e=>{S.user=e.target.value||null;renderGoalFilter();renderTasks();renderWeek()};
document.getElementById('btn-add-user').onclick=showAddUser;
document.getElementById('btn-save').onclick=saveAll;
document.getElementById('btn-add-task').onclick=showAddTask;
document.getElementById('goal-filter').onchange=()=>{renderTasks()};
document.getElementById('btn-prev').onclick=()=>{S.dayOff=Math.max(0,S.dayOff-1);renderWeek()};
document.getElementById('btn-next').onclick=()=>{S.dayOff=Math.min(6,S.dayOff+1);renderWeek()};
document.getElementById('btn-print').onclick=exportCSV;

document.getElementById('p-week').value=dispWeek;
document.getElementById('p-year').value=dispYear;

window.addEventListener('resize',()=>{const ph=innerWidth<768;if(ph!==S.phone){S.phone=ph;renderWeek()}});
setTimeout(()=>{document.getElementById('week-body').scrollTop=7*HPX},120);
setInterval(()=>{const vi=S.phone?[S.dayOff]:[0,1,2,3,4,5,6];renderNowLine(vi,dayDates())},60000);

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
renderAll();
initMSAL();
</script>
